description: >-
  FinOps view of STACK spend. STACK is a per-seat SaaS subscription: cost is
  driven by the number of full-access (estimator) seats, billed annually, with
  unlimited viewer seats and unlimited projects included. This is a predictable
  fixed/recurring model rather than usage-metered consumption - the primary cost
  lever is seat count and plan tier (Premium vs Pro), with volume discounts as
  seats are added. Programmatic API access is not separately metered per call;
  it is unlocked by an API-Enabled Subscription or partner agreement (quote-only,
  often via the API + BUILD bundle). There is no per-request API charge in the
  public materials.
notes: >-
  Per-seat rates and API bundle pricing are quote-sensitive and not reconciled
  here; verify with STACK. Because billing is seat-based rather than usage-based,
  optimization centers on right-sizing full-access seats (viewers are free) and
  consolidating projects, not on throttling API traffic.
