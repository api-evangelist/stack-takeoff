principles:
- name: Visibility
  description: Track subscribed full-access seat count and plan tier per account; API access is a subscription flag, not a metered stream.
- name: Allocation
  description: Map full-access seats to estimators/teams so subscription cost lands on the right cost centers; viewer seats are free.
- name: Optimization
  description: Right-size full-access seats (deactivate unused estimators), use free viewer seats for stakeholders, and negotiate volume discounts as seats grow.
- name: Accountability
  description: Review seat utilization ahead of each annual renewal; confirm the API + BUILD bundle is still needed for active integrations.
