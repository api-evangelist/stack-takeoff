aid: stack-takeoff
url: https://raw.githubusercontent.com/api-evangelist/stack-takeoff/refs/heads/main/apis.yml
name: STACK
kind: company
description: STACK Construction Technologies makes cloud-based preconstruction
  software for on-screen takeoff and estimating used by contractors across most
  trades. STACK does expose a real, documented REST API (v2), but access is gated -
  you must be a STACK customer on an API-Enabled Subscription (or an approved
  partner) to obtain credentials. Authentication is OAuth 2.0, offered as
  two-legged (client-credentials, server-to-server) and three-legged
  (authorization-code, on behalf of a user) flows. Tokens are issued by a
  per-tenant authorization server (base pattern https://{server}/api/v2). The full
  endpoint reference sits behind an access request; the API surface catalogued here
  is modeled from STACK's public developer overview, authentication guide, and
  tutorials - it is not sourced from an official machine-readable OpenAPI document.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Construction
